name: "Build & Release Android"

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup-Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        shell: powershell
        run: |
          $vLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)' | Select-Object -First 1
          if (-not $vLine) { Write-Error 'version not found in pubspec.yaml'; exit 1 }
          $ver = $vLine.Matches[0].Groups[1].Value.Split('+')[0]
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Create keystore file
        run: |
          $b64 = "${{ secrets.KEY_STORE }}" -replace "`r|`n", ""
          $filename = "./android/upload-keystore.jks"
          $bytes =[Convert]::FromBase64String($b64)
          [IO.File]::WriteAllBytes($filename, $bytes)

      - name: Create Keystore properties
        run: |
          echo keyPassword=\${{ secrets.KEY_PASSWORD }} > ./android/key.properties
          echo storePassword=\${{ secrets.STORE_PASSWORD }} >> ./android/key.properties
          echo keyAlias=\${{ secrets.KEY_ALIAS }} >> ./android/key.properties
          echo storeFile=upload-keystore.jks >> ./android/key.properties

      - name: Build App files
        run: flutter build apk --release --split-per-abi --build-number ${{github.run_number}}

      - name: Verify Sign
        run: |
          $buildToolsDir = Get-ChildItem "$env:ANDROID_HOME\build-tools" | Where-Object { $_.PSIsContainer } | Sort-Object Name -Descending | Select-Object -First 1
          Write-Host "Using build tools version: $($buildToolsDir.Name)"
          & "$($buildToolsDir.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-release.apk
          & "$($buildToolsDir.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          & "$($buildToolsDir.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          & "$($buildToolsDir.FullName)\apksigner.bat" verify build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Rename APK files
        shell: powershell
        run: |
          Rename-Item -Path "build/app/outputs/flutter-apk/app-release.apk" -NewName "quicksnap_android_v$env:VERSION+${{github.run_number}}_universal.apk"
          Rename-Item -Path "build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk" -NewName "quicksnap_android_v$env:VERSION+${{github.run_number}}_armeabi-v7a.apk"
          Rename-Item -Path "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" -NewName "quicksnap_android_v$env:VERSION+${{github.run_number}}_arm64-v8a.apk"
          Rename-Item -Path "build/app/outputs/flutter-apk/app-x86_64-release.apk" -NewName "quicksnap_android_v$env:VERSION+${{github.run_number}}_x86_64.apk"

      - name: Create build-number.txt file
        run: echo ${{github.run_number}} > build-number.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Release-Android
          path: |
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_universal.apk
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_armeabi-v7a.apk
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_arm64-v8a.apk
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_x86_64.apk
            build-number.txt

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_universal.apk
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_armeabi-v7a.apk
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_arm64-v8a.apk
            build/app/outputs/flutter-apk/quicksnap_android_v${{ env.VERSION }}+${{github.run_number}}_x86_64.apk
            build-number.txt
          tag: v${{ env.VERSION }}+${{github.run_number}}
          token: ${{secrets.GITHUB_TOKEN}}
          prerelease: false
          allowUpdates: true
